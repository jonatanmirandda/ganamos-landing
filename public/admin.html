<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin · Chats en vivo</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif; color: #11151c; background: #f3f4f8; }
    .app { display: grid; grid-template-columns: 320px 1fr 280px; height: 100vh; }
    aside, main, .meta { background: #fff; border-right: 1px solid #ececef; }
    .meta { border-right: 0; border-left: 1px solid #ececef; padding: 1rem; overflow-y: auto; }
    header.topbar {
      grid-column: 1 / -1; height: 56px; display: flex; align-items: center; gap: 12px;
      padding: 0 16px; background: #11151c; color: #fff; border-bottom: 1px solid #000;
    }
    header.topbar img { height: 28px; }
    header.topbar h1 { font-size: 0.95rem; margin: 0; font-weight: 600; opacity: 0.9; }
    header.topbar .status { margin-left: auto; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
    header.topbar .status .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    header.topbar .status.live .dot { background: #22c55e; }

    .layout { display: grid; grid-template-columns: 320px 1fr 280px; height: calc(100vh - 56px); }

    /* sidebar */
    .sidebar { display: flex; flex-direction: column; overflow: hidden; }
    .sidebar h2 { font-size: 0.85rem; padding: 12px 16px; margin: 0; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid #ececef; }
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item {
      padding: 12px 16px; border-bottom: 1px solid #f0f1f4; cursor: pointer;
      display: flex; flex-direction: column; gap: 4px;
    }
    .chat-item:hover { background: #f7f8fa; }
    .chat-item.active { background: #eef0f4; }
    .chat-item .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .chat-item .name { font-weight: 600; font-size: 0.95rem; }
    .chat-item .time { font-size: 0.72rem; color: #8b94a3; }
    .chat-item .last { font-size: 0.85rem; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .chat-item .pill {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.06em;
      background: #e5e7eb; color: #4b5563;
    }
    .chat-item .pill.open    { background: #d1fae5; color: #065f46; }
    .chat-item .pill.handoff { background: #ffedd5; color: #9a3412; }
    .chat-item .pill.closed  { background: #e5e7eb; color: #6b7280; }

    /* main thread */
    main { display: flex; flex-direction: column; overflow: hidden; }
    .thread-head {
      padding: 12px 16px; border-bottom: 1px solid #ececef;
      display: flex; gap: 12px; align-items: center;
    }
    .thread-head .name { font-weight: 700; }
    .thread-head .sub { font-size: 0.85rem; color: #6b7280; }
    .thread-head .actions { margin-left: auto; display: flex; gap: 6px; }
    .thread-head .actions button {
      font: inherit; cursor: pointer; padding: 6px 12px; border-radius: 8px;
      background: #fff; border: 1px solid #d1d5db;
    }
    .thread-head .actions button:hover { background: #f7f8fa; }
    .thread-head .actions .danger { color: #b91c1c; border-color: #f3c1c1; }

    .thread { flex: 1; overflow-y: auto; padding: 16px; background: #f7f8fa; display: flex; flex-direction: column; gap: 6px; }
    .m { max-width: 75%; padding: 0.55rem 0.85rem; border-radius: 14px; font-size: 0.93rem; word-wrap: break-word; }
    .m-user     { background: #fff; border: 1px solid #ececef; border-bottom-left-radius: 4px; align-self: flex-start; }
    .m-bot      { background: #f0e7fb; border: 1px solid #e0d0f4; border-bottom-left-radius: 4px; align-self: flex-start; opacity: 0.85; }
    .m-operator { background: #11151c; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .m-system   { align-self: center; background: transparent; color: #6b7280; font-size: 0.78rem; font-style: italic; }
    .m-meta { font-size: 0.7rem; color: #9aa1ad; padding: 0 0.85rem; }
    .m img { max-width: 280px; border-radius: 8px; margin-top: 6px; display: block; }
    .m a { color: inherit; text-decoration: underline; }

    .composer {
      display: flex; gap: 8px; padding: 12px; border-top: 1px solid #ececef; background: #fff;
    }
    .composer input { flex: 1; padding: 0.7rem 0.8rem; border: 1px solid #d1d5db; border-radius: 10px; font: inherit; outline: none; }
    .composer input:focus { border-color: #11151c; }
    .composer button { padding: 0.7rem 1.2rem; border: 0; border-radius: 10px; background: #11151c; color: #fff; font-weight: 600; cursor: pointer; }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* meta panel */
    .meta h3 { font-size: 0.85rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 12px; }
    .meta dl { margin: 0 0 18px; font-size: 0.92rem; }
    .meta dt { color: #6b7280; font-size: 0.78rem; }
    .meta dd { margin: 2px 0 10px; font-weight: 600; word-break: break-word; }
    .meta .empty { color: #8b94a3; font-style: italic; font-size: 0.9rem; }

    /* login */
    .login {
      display: flex; align-items: center; justify-content: center; height: 100vh; background: #11151c;
    }
    .login form {
      background: #fff; padding: 28px; border-radius: 16px; min-width: 320px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .login h1 { margin: 0 0 8px; font-size: 1.1rem; }
    .login input { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font: inherit; }
    .login button { padding: 10px; border: 0; border-radius: 8px; background: #11151c; color: #fff; font: inherit; font-weight: 600; cursor: pointer; }
    .login .err { color: #b91c1c; font-size: 0.85rem; min-height: 1em; }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 280px 1fr; }
      .meta { display: none; }
    }
  </style>
</head>
<body>
  <div id="login-screen" class="login" hidden>
    <form id="login-form">
      <h1>Panel de operador</h1>
      <input type="text" id="login-user" placeholder="Usuario" autocomplete="username" required />
      <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password" required />
      <button type="submit">Ingresar</button>
      <p class="err" id="login-err"></p>
    </form>
  </div>

  <div id="app" class="app" hidden>
    <header class="topbar">
      <img src="/img/logo.svg" alt="Ganamos.net" />
      <h1>Atención al cliente · Panel en vivo</h1>
      <div class="status" id="conn-status"><span class="dot"></span><span>conectando...</span></div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <h2>Conversaciones</h2>
        <div class="chat-list" id="chat-list"></div>
      </aside>

      <main>
        <div class="thread-head" id="thread-head">
          <div class="info">
            <div class="name">Seleccioná una conversación</div>
            <div class="sub">Las nuevas aparecen arriba en tiempo real.</div>
          </div>
          <div class="actions">
            <button id="open-wa" hidden>Abrir en WhatsApp</button>
            <button id="close-chat" class="danger" hidden>Cerrar chat</button>
          </div>
        </div>
        <div class="thread" id="thread"></div>
        <form class="composer" id="composer">
          <input type="text" id="reply" placeholder="Escribí tu respuesta..." disabled autocomplete="off" />
          <button type="submit" id="send" disabled>Enviar</button>
        </form>
      </main>

      <section class="meta" id="meta">
        <h3>Datos del cliente</h3>
        <div id="meta-content"><p class="empty">Sin chat seleccionado.</p></div>
      </section>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/admin.js" defer></script>
</body>
</html>
