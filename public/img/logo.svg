    </g>

    <text x="234" y="80" fill="url(#silver)" stroke="#1a1a1a" stroke-width="1.2">M</text>
    <text x="290" y="80" fill="url(#silver)" stroke="#1a1a1a" stroke-width="1.2">O</text>
