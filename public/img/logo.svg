    <text x="100" y="80" fill="url(#silver)" stroke="#1a1a1a" stroke-width="1.2">N</text>

    <g transform="translate(135,18)">
      <path d="M30 6 C 14 26, 0 38, 0 52 C 0 64, 10 72, 20 72 C 26 72, 30 68, 32 64 L 28 78 L 38 78 L 34 64 C 36 68, 40 72, 46 72 C 56 72, 66 64, 66 52 C 66 38, 52 26, 36 6 C 35 4, 33 4, 30 6 Z"
