<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 110" role="img" aria-label="GANAMOS.NET">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="40%" stop-color="#bfbfbf"/>
      <stop offset="55%" stop-color="#7a7a7a"/>
      <stop offset="100%" stop-color="#e6e6e6"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a56c7"/>
      <stop offset="100%" stop-color="#5b2a85"/>
    </linearGradient>
    <filter id="bevel" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feSpecularLighting result="spec" surfaceScale="2" specularConstant="0.9" specularExponent="20" lighting-color="#ffffff">
        <feDistantLight azimuth="225" elevation="55"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="speclit"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="speclit"/>
      </feMerge>
    </filter>
  </defs>

