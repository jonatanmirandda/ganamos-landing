services:
  - type: web
    name: ganamos-landing
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
    healthCheckPath: /api/config
    autoDeploy: true
